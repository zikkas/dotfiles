general {
    no_fade_in = true
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = screenshot  # This takes a live screenshot
    blur_passes = 3     # 0 disables blurring
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(69, 133, 136)
    inner_color = rgb(29, 32, 33)
    font_color = rgb(235, 219, 178)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(235, 219, 178)
    font_size = 64
    font_family = JetBrains Mono
    position = 0, 80
    halign = center
    valign = center
}
